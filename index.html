<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CGM Lead Prospecting Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
:root {
  --cgm-primary: #003366;
  --cgm-primary-50: #8099B2;
  --cgm-secondary: #2BA1EA;
  --cgm-tertiary: #E1F3FF;
  --cgm-accent: #FCCF4C;
  --cgm-accent-50: #FDE7A5;
  --cgm-accent-weak: #FFFADE;
  --cgm-neutral-dark: #919191;
  --cgm-neutral-bright: #E9E9E9;
  --cgm-white: #FFFFFF;
  --cgm-ecru: #F5F0EB;
  --sidebar-w: 220px;
  --topbar-h: 60px;
  --radius: 12px;
  --shadow: 0 2px 12px rgba(0,51,102,0.09);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans', Helvetica, Arial, sans-serif; background: var(--cgm-ecru); color: var(--cgm-primary); min-height: 100vh; font-size: 14px; }
button { cursor: pointer; font-family: inherit; }
input, select, textarea { font-family: inherit; }
a { text-decoration: none; color: inherit; }
.scroll-y { overflow-y: auto; }

/* Layout */
.app-shell { display: flex; min-height: 100vh; }
.sidebar { width: var(--sidebar-w); background: var(--cgm-primary); display: flex; flex-direction: column; position: fixed; top: 0; left: 0; height: 100vh; z-index: 100; }
.sidebar-logo { padding: 20px 18px 16px; border-bottom: 1px solid rgba(255,255,255,0.12); }
.sidebar-logo .cgm { font-weight: 700; font-size: 18px; color: #fff; letter-spacing: -0.3px; }
.sidebar-logo .one { color: var(--cgm-secondary); }
.sidebar-logo .sub { font-size: 10px; color: rgba(255,255,255,0.5); margin-top: 2px; letter-spacing: 0.5px; text-transform: uppercase; }
.sidebar-nav { flex: 1; padding: 12px 0; overflow-y: auto; }
.nav-section { padding: 8px 18px 4px; font-size: 10px; font-weight: 600; color: rgba(255,255,255,0.35); letter-spacing: 1px; text-transform: uppercase; }
.nav-item { display: flex; align-items: center; gap: 10px; padding: 9px 18px; font-size: 13px; font-weight: 500; color: rgba(255,255,255,0.7); cursor: pointer; border-left: 3px solid transparent; transition: all 0.15s; }
.nav-item:hover { background: rgba(255,255,255,0.06); color: #fff; }
.nav-item.active { background: rgba(43,161,234,0.15); color: var(--cgm-secondary); border-left-color: var(--cgm-secondary); }
.nav-item .nav-icon { width: 18px; text-align: center; font-size: 15px; }
.sidebar-footer { padding: 14px 18px; border-top: 1px solid rgba(255,255,255,0.1); font-size: 11px; color: rgba(255,255,255,0.4); }

.main-area { margin-left: var(--sidebar-w); flex: 1; display: flex; flex-direction: column; min-height: 100vh; }
.topbar { height: var(--topbar-h); background: var(--cgm-white); border-bottom: 1px solid var(--cgm-neutral-bright); display: flex; align-items: center; padding: 0 24px; gap: 12px; position: sticky; top: 0; z-index: 50; }
.topbar-title { font-weight: 700; font-size: 15px; color: var(--cgm-primary); flex: 1; }
.topbar-sub { font-size: 12px; color: var(--cgm-neutral-dark); font-weight: 400; margin-left: 8px; }
.topbar-search { display: flex; align-items: center; background: var(--cgm-ecru); border: 1px solid var(--cgm-neutral-bright); border-radius: 8px; padding: 6px 12px; gap: 6px; font-size: 13px; color: var(--cgm-neutral-dark); min-width: 200px; }
.topbar-search input { border: none; background: transparent; outline: none; font-size: 13px; width: 100%; color: var(--cgm-primary); }
.sync-badge { display: flex; align-items: center; gap: 5px; font-size: 11px; font-weight: 600; padding: 4px 10px; border-radius: 20px; }
.sync-badge.live { background: #E6F9F0; color: #1a7a4a; }
.sync-badge.stale { background: #FFF3CD; color: #856404; }
.page-content { flex: 1; padding: 24px; max-width: 1400px; }

/* Buttons */
.btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; border-radius: 8px; font-size: 13px; font-weight: 600; border: none; transition: all 0.15s; }
.btn-primary { background: var(--cgm-accent); color: var(--cgm-primary); }
.btn-primary:hover { background: #f0c030; }
.btn-secondary { background: var(--cgm-secondary); color: #fff; }
.btn-secondary:hover { background: #1a8fd1; }
.btn-ghost { background: transparent; border: 1px solid var(--cgm-neutral-bright); color: var(--cgm-primary); }
.btn-ghost:hover { background: var(--cgm-ecru); }
.btn-danger { background: #dc3545; color: #fff; }
.btn-danger:hover { background: #b02a37; }
.btn-sm { padding: 5px 10px; font-size: 12px; }

/* Cards */
.card { background: var(--cgm-white); border-radius: var(--radius); box-shadow: var(--shadow); padding: 20px; }
.card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
.card-title { font-weight: 700; font-size: 14px; color: var(--cgm-primary); }
.card-sub { font-size: 12px; color: var(--cgm-neutral-dark); }

/* KPI cards */
.kpi-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 14px; margin-bottom: 20px; }
.kpi-card { background: var(--cgm-white); border-radius: var(--radius); padding: 16px; box-shadow: var(--shadow); border-top: 3px solid var(--cgm-secondary); }
.kpi-card.accent { border-top-color: var(--cgm-accent); }
.kpi-card.success { border-top-color: #28a745; }
.kpi-card.warn { border-top-color: #fd7e14; }
.kpi-card.danger { border-top-color: #dc3545; }
.kpi-label { font-size: 11px; font-weight: 600; color: var(--cgm-neutral-dark); text-transform: uppercase; letter-spacing: 0.5px; }
.kpi-value { font-size: 28px; font-weight: 700; color: var(--cgm-primary); margin: 4px 0 2px; line-height: 1; }
.kpi-delta { font-size: 11px; font-weight: 600; }
.kpi-delta.pos { color: #28a745; }
.kpi-delta.neg { color: #dc3545; }
.kpi-delta.neu { color: var(--cgm-neutral-dark); }

/* Grid helpers */
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }
.flex-row { display: flex; align-items: center; }
.flex-between { display: flex; align-items: center; justify-content: space-between; }
.gap-8 { gap: 8px; }
.gap-12 { gap: 12px; }
.mt-4 { margin-top: 4px; }
.mt-8 { margin-top: 8px; }
.mt-12 { margin-top: 12px; }
.mt-16 { margin-top: 16px; }
.mb-16 { margin-bottom: 16px; }
.text-sm { font-size: 12px; }
.text-xs { font-size: 11px; }
.text-muted { color: var(--cgm-neutral-dark); }
.text-right { text-align: right; }
.font-bold { font-weight: 700; }
.font-600 { font-weight: 600; }
.full-width { width: 100%; }

/* Tables */
.data-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.data-table thead tr { background: var(--cgm-primary); color: #fff; }
.data-table thead th { padding: 10px 12px; text-align: left; font-weight: 600; font-size: 12px; white-space: nowrap; }
.data-table tbody tr { border-bottom: 1px solid var(--cgm-neutral-bright); transition: background 0.1s; }
.data-table tbody tr:hover { background: var(--cgm-tertiary); }
.data-table tbody tr:nth-child(even) { background: #fafbff; }
.data-table tbody tr:nth-child(even):hover { background: var(--cgm-tertiary); }
.data-table td { padding: 9px 12px; vertical-align: middle; }
.data-table .checkbox-col { width: 36px; }

/* Badges */
.badge { display: inline-block; padding: 3px 8px; border-radius: 20px; font-size: 11px; font-weight: 600; }
.badge-new { background: var(--cgm-tertiary); color: var(--cgm-secondary); }
.badge-working { background: #fff3cd; color: #856404; }
.badge-qualified { background: #d4edda; color: #155724; }
.badge-disqualified { background: #f8d7da; color: #721c24; }
.badge-npi { background: #e3d5ff; color: #4a1e8c; }
.badge-clia { background: #d5f0ff; color: #0c5480; }
.badge-lab { background: #ffd5b8; color: #7a3b00; }

/* Source type pill */
.source-pill { display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 700; }

/* Form elements */
.form-group { margin-bottom: 14px; }
.form-label { display: block; font-size: 12px; font-weight: 600; color: var(--cgm-primary); margin-bottom: 4px; }
.form-input { width: 100%; padding: 8px 10px; border: 1px solid var(--cgm-neutral-bright); border-radius: 8px; font-size: 13px; outline: none; transition: border 0.15s; background: #fff; }
.form-input:focus { border-color: var(--cgm-secondary); }
.form-select { width: 100%; padding: 8px 10px; border: 1px solid var(--cgm-neutral-bright); border-radius: 8px; font-size: 13px; outline: none; background: #fff; cursor: pointer; }
.form-select:focus { border-color: var(--cgm-secondary); }

/* Dropzone */
.dropzone { border: 2px dashed var(--cgm-secondary); border-radius: var(--radius); padding: 40px; text-align: center; cursor: pointer; transition: all 0.2s; background: var(--cgm-tertiary); }
.dropzone:hover, .dropzone.drag-over { background: var(--cgm-accent-weak); border-color: var(--cgm-accent); }
.dropzone-icon { font-size: 40px; margin-bottom: 12px; }
.dropzone-title { font-size: 15px; font-weight: 700; color: var(--cgm-primary); }
.dropzone-sub { font-size: 12px; color: var(--cgm-neutral-dark); margin-top: 4px; }

/* Rep cards */
.rep-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 12px; }
.rep-card { background: var(--cgm-white); border-radius: var(--radius); padding: 14px; box-shadow: var(--shadow); border: 2px solid transparent; cursor: pointer; transition: all 0.15s; }
.rep-card:hover { border-color: var(--cgm-secondary); }
.rep-card.selected { border-color: var(--cgm-accent); background: var(--cgm-accent-weak); }
.rep-avatar { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 14px; color: #fff; margin-bottom: 8px; }
.rep-name { font-weight: 700; font-size: 13px; }
.rep-role { font-size: 11px; color: var(--cgm-neutral-dark); }
.rep-count { font-size: 18px; font-weight: 700; color: var(--cgm-secondary); margin-top: 4px; }

/* Drawer */
.drawer-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.35); z-index: 200; }
.drawer { position: fixed; right: 0; top: 0; bottom: 0; width: 420px; background: #fff; z-index: 201; box-shadow: -4px 0 24px rgba(0,51,102,0.14); padding: 24px; overflow-y: auto; }
.drawer-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; padding-bottom: 14px; border-bottom: 1px solid var(--cgm-neutral-bright); }
.drawer-title { font-size: 16px; font-weight: 700; color: var(--cgm-primary); }
.close-btn { background: none; border: none; font-size: 20px; color: var(--cgm-neutral-dark); cursor: pointer; padding: 2px 6px; border-radius: 6px; }
.close-btn:hover { background: var(--cgm-ecru); }

/* Filter bar */
.filter-bar { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 14px; padding: 12px 16px; background: var(--cgm-white); border-radius: var(--radius); box-shadow: var(--shadow); }

/* Leaderboard */
.lb-rank { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 13px; }
.lb-rank-1 { background: var(--cgm-accent); color: var(--cgm-primary); }
.lb-rank-2 { background: #C0C0C0; color: #fff; }
.lb-rank-3 { background: #CD7F32; color: #fff; }
.lb-rank-other { background: var(--cgm-ecru); color: var(--cgm-primary); }
.progress-bar-bg { background: var(--cgm-neutral-bright); border-radius: 20px; height: 6px; flex: 1; min-width: 60px; }
.progress-bar-fill { height: 6px; border-radius: 20px; background: var(--cgm-secondary); }

/* Coaching flag */
.coach-flag { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 20px; }
.coach-flag.red { background: #f8d7da; color: #721c24; }
.coach-flag.yellow { background: #fff3cd; color: #856404; }
.coach-flag.green { background: #d4edda; color: #155724; }

/* Export cards */
.export-option { background: var(--cgm-white); border-radius: var(--radius); border: 1px solid var(--cgm-neutral-bright); padding: 18px; cursor: pointer; transition: all 0.15s; }
.export-option:hover { border-color: var(--cgm-secondary); box-shadow: var(--shadow); }

/* Admin tabs */
.tab-bar { display: flex; gap: 4px; border-bottom: 2px solid var(--cgm-neutral-bright); margin-bottom: 20px; }
.tab-btn { padding: 8px 16px; font-size: 13px; font-weight: 600; border: none; background: transparent; color: var(--cgm-neutral-dark); cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -2px; transition: all 0.15s; }
.tab-btn:hover { color: var(--cgm-primary); }
.tab-btn.active { color: var(--cgm-secondary); border-bottom-color: var(--cgm-secondary); }

/* Import steps */
.step-bar { display: flex; align-items: center; gap: 0; margin-bottom: 24px; }
.step-item { display: flex; align-items: center; gap: 8px; flex: 1; }
.step-num { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; flex-shrink: 0; }
.step-num.done { background: #28a745; color: #fff; }
.step-num.active { background: var(--cgm-secondary); color: #fff; }
.step-num.pending { background: var(--cgm-neutral-bright); color: var(--cgm-neutral-dark); }
.step-label { font-size: 12px; font-weight: 600; }
.step-connector { flex: 1; height: 2px; background: var(--cgm-neutral-bright); margin: 0 6px; }
.step-connector.done { background: #28a745; }

/* Notification toast */
.toast-wrap { position: fixed; top: 16px; right: 16px; z-index: 999; display: flex; flex-direction: column; gap: 8px; }
.toast { background: var(--cgm-primary); color: #fff; padding: 12px 18px; border-radius: 10px; font-size: 13px; font-weight: 500; min-width: 240px; box-shadow: 0 4px 16px rgba(0,0,0,0.2); border-left: 4px solid var(--cgm-accent); animation: slideIn 0.2s ease; }
.toast.success { border-left-color: #28a745; }
.toast.error { border-left-color: #dc3545; }
@keyframes slideIn { from { opacity: 0; transform: translateX(30px); } to { opacity: 1; transform: translateX(0); } }

/* Table wrapper scroll */
.table-wrap { overflow-x: auto; border-radius: var(--radius); }
.table-wrap .data-table thead th:first-child { border-radius: 12px 0 0 0; }
.table-wrap .data-table thead th:last-child { border-radius: 0 12px 0 0; }

/* Stat row in leaderboard */
.stat-cell { min-width: 60px; text-align: right; }

/* Section headings */
.section-title { font-size: 16px; font-weight: 700; color: var(--cgm-primary); margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
.section-title::after { content: ''; flex: 1; height: 1px; background: var(--cgm-neutral-bright); }

/* Empty state */
.empty-state { text-align: center; padding: 48px 24px; color: var(--cgm-neutral-dark); }
.empty-state-icon { font-size: 40px; margin-bottom: 10px; }
.empty-state-title { font-size: 15px; font-weight: 700; color: var(--cgm-primary); margin-bottom: 6px; }
.empty-state-sub { font-size: 13px; }

/* Pagination */
.pagination { display: flex; align-items: center; gap: 4px; margin-top: 14px; }
.page-btn { padding: 5px 10px; border: 1px solid var(--cgm-neutral-bright); border-radius: 6px; background: #fff; font-size: 12px; cursor: pointer; }
.page-btn:hover { background: var(--cgm-tertiary); }
.page-btn.active { background: var(--cgm-secondary); color: #fff; border-color: var(--cgm-secondary); }

/* Field mapper */
.field-map-row { display: grid; grid-template-columns: 1fr 16px 1fr; align-items: center; gap: 8px; margin-bottom: 8px; }
.map-arrow { color: var(--cgm-secondary); font-weight: 700; text-align: center; }

/* Notes / activity */
.activity-row { display: flex; gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--cgm-neutral-bright); }
.activity-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--cgm-secondary); margin-top: 5px; flex-shrink: 0; }
.activity-content { flex: 1; font-size: 12px; }
.activity-time { font-size: 11px; color: var(--cgm-neutral-dark); }

/* Tag */
.tag { display: inline-block; padding: 2px 8px; background: var(--cgm-tertiary); color: var(--cgm-secondary); border-radius: 6px; font-size: 11px; font-weight: 600; margin: 2px; }

/* Responsive utility */
@media (max-width: 900px) { .grid-2, .grid-3 { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback, useMemo } = React;

// ─── CONSTANTS ───────────────────────────────────────────────────────────────
const REP_COLORS = {
  Brenda:  '#B5179E', Misty:   '#4361EE', Hanna:   '#F77F00',
  Maia:    '#3A0CA3', Ely:     '#2DC653', Ryan:    '#E63946',
  Russ:    '#118AB2', Paul:    '#06D6A0', Derek:   '#FFBE0B', Honelyn: '#8338EC'
};
const REP_ROLES = {
  Brenda: 'LGS', Misty: 'LGS', Hanna: 'BDR', Maia: 'BDR',
  Ely: 'SDR', Ryan: 'SDR', Russ: 'SDR', Paul: 'SDR', Derek: 'SDR', Honelyn: 'SDR'
};
const REP_TERRITORIES = {
  Brenda: 'Southeast', Misty: 'Northeast', Hanna: 'Midwest', Maia: 'West',
  Ely: 'Philippines', Ryan: 'Southwest', Russ: 'Southeast', Paul: 'Mid-Atlantic', Derek: 'Mountain', Honelyn: 'Philippines'
};
const REPS = Object.keys(REP_COLORS);
const SOURCE_TYPES = ['NPI', 'CLIA', 'LAB'];
const STATUSES = ['New', 'Working', 'Qualified', 'Disqualified', 'Meeting Set', 'Not Interested'];
const CAMPAIGNS = ['ARIA RCM', 'Billing Services', 'CGM LIS/LIM', 'CGM eMDs', 'CGM APRIMA', 'CGM RPM', 'TruBridge Displacement'];

// ─── SAMPLE DATA ─────────────────────────────────────────────────────────────
function genSampleLeads(n = 120) {
  const practices = ['Valley Medical Group','Sunrise Family Clinic','Blue Ridge Internal Medicine','Summit Cardiology','Prairie Health Partners','Coastal Urology','Metro Gastro Associates','Highland Primary Care','Lakeview FQHC','Desert Endocrinology','Piedmont Orthopedics','Bay Area Nephrology','Riverview Women\'s Health','Northside Pediatrics','Clearwater Wound Care','Evergreen Geriatrics','Central Billing Associates','Westside Lab Services','Pacific Diagnostics','Heritage Clinical Lab','Premier Reference Lab','Advanced Lab Solutions','MedPath Diagnostics','StatPath Labs','Alliance Pathology'];
  const states = ['AL','AZ','CA','CO','FL','GA','IL','IN','KY','MD','MI','MN','MO','NC','NJ','NM','NY','OH','PA','SC','TN','TX','VA','WA','WI'];
  const cities = ['Atlanta','Phoenix','Los Angeles','Denver','Miami','Chicago','Indianapolis','Baltimore','Detroit','Charlotte','Newark','Columbus','Philadelphia','Nashville','Houston','Richmond','Seattle','Madison'];
  const leads = [];
  for (let i = 0; i < n; i++) {
    const src = SOURCE_TYPES[i % 3];
    const rep = REPS[i % REPS.length];
    const status = STATUSES[Math.floor(Math.random() * STATUSES.length)];
    leads.push({
      id: `L${String(i+1).padStart(4,'0')}`,
      businessName: practices[i % practices.length] + (i > practices.length ? ` #${Math.floor(i/practices.length)+1}` : ''),
      sourceType: src,
      providerNumber: src === 'NPI' ? `1${String(1000000000 + i).slice(1)}` : src === 'CLIA' ? `${states[i%states.length]}D${String(100000+i)}` : `LAB-${String(10000+i)}`,
      npi: src === 'NPI' ? `1${String(1000000000 + i).slice(1)}` : '',
      contactName: ['Sarah Johnson','Mike Chen','Maria Garcia','James Wilson','Emily Davis','Robert Lee','Jennifer Brown','David Martinez','Lisa Anderson','Kevin Taylor'][i % 10],
      phone: `(${(200+i%800).toString().padStart(3,'0')}) ${String(200+i).slice(-3)}-${String(1000+i).slice(-4)}`,
      city: cities[i % cities.length],
      state: states[i % states.length],
      zip: String(10000 + (i*17 % 89999)),
      status,
      assignedRep: rep,
      campaign: CAMPAIGNS[i % CAMPAIGNS.length],
      notes: '',
      specialty: ['Family Medicine','Internal Medicine','Cardiology','Endocrinology','Nephrology','FQHC','Lab','Pathology'][i % 8],
      importedAt: new Date(Date.now() - (i * 3600000)).toISOString(),
      flag: Math.random() > 0.85 ? '⭐' : ''
    });
  }
  return leads;
}

function genActivities(leads) {
  const types = ['Call', 'Email', 'VM', 'LinkedIn', 'Meeting Set', 'Note'];
  const acts = [];
  leads.slice(0,40).forEach((l, i) => {
    acts.push({ id: `A${i}`, leadId: l.id, type: types[i%types.length], timestamp: new Date(Date.now() - i*1800000).toISOString(), rep: l.assignedRep, note: `${types[i%types.length]} completed for ${l.businessName}` });
  });
  return acts;
}

// ─── TOAST ────────────────────────────────────────────────────────────────────
function Toast({ toasts, removeToast }) {
  return <div className="toast-wrap">{toasts.map(t => <div key={t.id} className={`toast ${t.type||''}`}>{t.msg}</div>)}</div>;
}

// ─── SIDEBAR ─────────────────────────────────────────────────────────────────
const NAV_ITEMS = [
  { id: 'home', label: 'Today / Home', icon: '🏠', section: 'MAIN' },
  { id: 'import', label: 'Import Leads', icon: '📥', section: 'MAIN' },
  { id: 'queue', label: 'Lead Queue', icon: '📋', section: 'MAIN' },
  { id: 'assignment', label: 'Rep Assignment', icon: '👥', section: 'MANAGE' },

  { id: 'exports', label: 'Exports', icon: '📤', section: 'DATA' },

// ─── IMPORT PAGE ──────────────────────────────────────────────────────────────
function ImportPage({ onImport, addToast }) {
  const [step, setStep] = useState(0);
  const [files, setFiles] = useState([]);
  const [previewRows, setPreviewRows] = useState([]);
  const [headers, setHeaders] = useState([]);
  const [mapping, setMapping] = useState({});
  const [dragOver, setDragOver] = useState(false);
  const [detectedSource, setDetectedSource] = useState('');
  const [importCount, setImportCount] = useState(0);
  const fileInputRef = useRef();

  const TARGET_FIELDS = ['businessName','contactName','phone','npi','providerNumber','city','state','zip','specialty','sourceType'];

  function detectSource(hdrs) {
    const flat = hdrs.join(' ').toLowerCase();
    if (flat.includes('npi')) return 'NPI';
    if (flat.includes('clia')) return 'CLIA';
    if (flat.includes('lab') || flat.includes('pathol')) return 'LAB';
    return 'NPI';
  }

  function autoMap(hdrs) {
    const m = {};
    const rules = { businessName:['name','practice','business','company','org'], contactName:['contact','provider','physician','doctor','first'], phone:['phone','tel','fax'], npi:['npi'], providerNumber:['provider','clia','number','id'], city:['city'], state:['state'], zip:['zip','postal'], specialty:['specialty','type','category'] };
    TARGET_FIELDS.forEach(field => {
      const candidates = rules[field] || [];
      const found = hdrs.find(h => candidates.some(c => h.toLowerCase().includes(c)));
      if (found) m[field] = found;
    });
    return m;
  }

  function processFile(file) {
    const reader = new FileReader();
    reader.onload = e => {
      const data = new Uint8Array(e.target.result);
      const wb = XLSX.read(data, { type: 'array' });
      const ws = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws, { header: 1 });
      if (rows.length < 2) { addToast('File appears empty', 'error'); return; }
      const hdrs = rows[0].map(String);
      const dataRows = rows.slice(1, 11).map(r => {
        const obj = {};
        hdrs.forEach((h,i) => obj[h] = r[i] || '');
        return obj;
      });
      setHeaders(hdrs);
      setPreviewRows(dataRows);
      setDetectedSource(detectSource(hdrs));
      setMapping(autoMap(hdrs));
      setFiles(prev => [...prev, { name: file.name, rows: rows.length - 1, raw: rows }]);
      setStep(1);
    };
    reader.readAsArrayBuffer(file);
  }

  function handleDrop(e) {
    e.preventDefault(); setDragOver(false);
    const f = e.dataTransfer.files[0];
    if (f) processFile(f);
  }

  function handleImportConfirm() {
    const raw = files[0]?.raw || [];
    if (raw.length < 2) return;
    const hdrs = raw[0].map(String);
    const leads = raw.slice(1).map((r, i) => {
      const row = {};
      hdrs.forEach((h, j) => row[h] = r[j] || '');
      const mapped = {};
      TARGET_FIELDS.forEach(f => { if (mapping[f]) mapped[f] = row[mapping[f]] || ''; });
      return {
        id: `IMP${Date.now()}${i}`,
        businessName: mapped.businessName || `Imported Record ${i+1}`,
        sourceType: mapped.sourceType || detectedSource,
        providerNumber: mapped.providerNumber || '',
        npi: mapped.npi || '',
        contactName: mapped.contactName || '',
        phone: mapped.phone || '',
        city: mapped.city || '',
        state: mapped.state || '',
        zip: mapped.zip || '',
        specialty: mapped.specialty || '',
        status: 'New',
        assignedRep: REPS[i % REPS.length],
        campaign: '',
        notes: '',
        importedAt: new Date().toISOString(),
        flag: ''
      };
    });
    onImport(leads);
    setImportCount(leads.length);
    setStep(3);
    addToast(`Imported ${leads.length} leads successfully`, 'success');
  }

  const steps = ['Upload File','Map Fields','Preview','Complete'];
  return (
    <div className="page-content">
      <div className="step-bar">
        {steps.map((s,i) => (
          <React.Fragment key={s}>
            <div className="step-item">
              <div className={`step-num ${i<step?'done':i===step?'active':'pending'}`}>{i<step?'✓':i+1}</div>
              <span className="step-label" style={{color:i===step?'var(--cgm-secondary)':i<step?'#28a745':'var(--cgm-neutral-dark)'}}>{s}</span>
            </div>
            {i < steps.length-1 && <div className={`step-connector ${i<step?'done':''}`}></div>}
          </React.Fragment>
        ))}
      </div>

      {step === 0 && (
        <div className="grid-2" style={{alignItems:'start'}}>
          <div className="card">
            <div className="card-header"><div className="card-title">Upload File</div></div>
            <div className={`dropzone ${dragOver?'drag-over':''}`}
              onDragOver={e=>{e.preventDefault();setDragOver(true)}}
              onDragLeave={()=>setDragOver(false)}
              onDrop={handleDrop}
              onClick={()=>fileInputRef.current.click()}>
              <div className="dropzone-icon">📂</div>
              <div className="dropzone-title">Drop .xlsx or .csv here</div>
              <div className="dropzone-sub">or click to browse · NPI, CLIA, and Lab formats supported</div>
              <input ref={fileInputRef} type="file" accept=".xlsx,.csv,.xls" style={{display:'none'}} onChange={e=>e.target.files[0]&&processFile(e.target.files[0])} />
            </div>
          </div>
          <div className="card">
            <div className="card-header"><div className="card-title">Import History</div></div>
            {files.length === 0 ? <div className="empty-state"><div className="empty-state-icon">📄</div><div className="empty-state-title">No files imported yet</div></div>
            : files.map((f,i) => <div key={i} style={{padding:'8px 0',borderBottom:'1px solid var(--cgm-neutral-bright)',fontSize:13}}>{f.name} · <span style={{color:'var(--cgm-secondary)',fontWeight:600}}>{f.rows} rows</span></div>)}
          </div>
        </div>
      )}

      {step === 1 && (
        <div className="card">
          <div className="card-header">
            <div><div className="card-title">Map Fields</div><div className="card-sub">Detected source: <strong>{detectedSource}</strong> · {files[0]?.rows} rows</div></div>
            <select className="form-select" style={{width:140}} value={detectedSource} onChange={e=>setDetectedSource(e.target.value)}>
              {SOURCE_TYPES.map(s=><option key={s}>{s}</option>)}
            </select>
          </div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'10px 24px'}}>
            {TARGET_FIELDS.map(field => (
              <div className="field-map-row" key={field}>
                <div style={{fontSize:12,fontWeight:600,color:'var(--cgm-primary)',background:'var(--cgm-ecru)',padding:'6px 10px',borderRadius:6}}>{field}</div>
                <div className="map-arrow">→</div>
                <select className="form-select" value={mapping[field]||''} onChange={e=>setMapping(m=>({...m,[field]:e.target.value}))}>
                  <option value="">-- skip --</option>
                  {headers.map(h=><option key={h} value={h}>{h}</option>)}
                </select>
              </div>
            ))}
          </div>
          <div className="flex-row gap-8 mt-16">
            <button className="btn btn-ghost" onClick={()=>setStep(0)}>← Back</button>
            <button className="btn btn-secondary" onClick={()=>setStep(2)}>Preview Import →</button>
          </div>
        </div>
      )}

      {step === 2 && (
        <div className="card">
          <div className="card-header"><div className="card-title">Preview</div><div className="card-sub">First 10 rows · {files[0]?.rows} total</div></div>
          <div className="table-wrap">
            <table className="data-table">
              <thead><tr>{Object.keys(previewRows[0]||{}).slice(0,8).map(h=><th key={h}>{h}</th>)}</tr></thead>
              <tbody>{previewRows.map((r,i)=><tr key={i}>{Object.values(r).slice(0,8).map((v,j)=><td key={j}>{String(v).slice(0,40)}</td>)}</tr>)}</tbody>
            </table>
          </div>
          <div className="flex-row gap-8 mt-16">
            <button className="btn btn-ghost" onClick={()=>setStep(1)}>← Back</button>
            <button className="btn btn-primary" onClick={handleImportConfirm}>✓ Confirm Import ({files[0]?.rows} rows)</button>
          </div>
        </div>
      )}

      {step === 3 && (
        <div className="card" style={{textAlign:'center',padding:48}}>
          <div style={{fontSize:60,marginBottom:12}}>✅</div>
          <div style={{fontSize:22,fontWeight:800,color:'var(--cgm-primary)',marginBottom:8}}>Import Complete</div>
          <div style={{fontSize:15,color:'var(--cgm-neutral-dark)',marginBottom:24}}>{importCount.toLocaleString()} leads imported and assigned to reps via round-robin</div>
          <button className="btn btn-secondary" onClick={()=>{setStep(0);setFiles([]);setPreviewRows([]);setHeaders([]);}}>Import Another File</button>
        </div>
      )}
    </div>
  );
}

// ─── QUEUE PAGE ───────────────────────────────────────────────────────────────
function QueuePage({ leads, setLeads, addToast, globalSearch }) {
  const [filters, setFilters] = useState({ rep: '', status: '', source: '', campaign: '' });
  const [selected, setSelected] = useState([]);
  const [drawerLead, setDrawerLead] = useState(null);
  const [page, setPage] = useState(0);
  const PER_PAGE = 25;

  const filtered = useMemo(() => leads.filter(l => {
    if (filters.rep && l.assignedRep !== filters.rep) return false;
    if (filters.status && l.status !== filters.status) return false;
    if (filters.source && l.sourceType !== filters.source) return false;
    if (filters.campaign && l.campaign !== filters.campaign) return false;
    if (globalSearch) {
      const q = globalSearch.toLowerCase();
      return l.businessName.toLowerCase().includes(q) || l.npi.includes(q) || l.providerNumber.toLowerCase().includes(q) || l.contactName.toLowerCase().includes(q) || l.city.toLowerCase().includes(q);
    }
    return true;
  }), [leads, filters, globalSearch]);

  const paginated = filtered.slice(page * PER_PAGE, (page+1)*PER_PAGE);
  const totalPages = Math.ceil(filtered.length / PER_PAGE);

  function toggleSelect(id) { setSelected(s => s.includes(id) ? s.filter(x=>x!==id) : [...s, id]); }
  function toggleAll() { setSelected(s => s.length === paginated.length ? [] : paginated.map(l=>l.id)); }

  function bulkUpdate(field, value) {
    setLeads(prev => prev.map(l => selected.includes(l.id) ? {...l, [field]: value} : l));
    addToast(`Updated ${selected.length} leads`, 'success');
    setSelected([]);
  }

  function updateLead(id, patch) {
    setLeads(prev => prev.map(l => l.id === id ? {...l, ...patch} : l));
    setDrawerLead(d => d ? {...d, ...patch} : d);
  }

  const statusBadgeClass = s => { const m = {New:'badge-new',Working:'badge-working',Qualified:'badge-qualified',Disqualified:'badge-disqualified','Meeting Set':'badge-qualified','Not Interested':'badge-disqualified'}; return m[s]||'badge-new'; };
  const sourceBadgeClass = s => ({NPI:'badge-npi',CLIA:'badge-clia',LAB:'badge-lab'}[s]||'badge-new');

  return (
    <div className="page-content">
      <div className="filter-bar">
        <select className="form-select" style={{width:130}} value={filters.rep} onChange={e=>setFilters(f=>({...f,rep:e.target.value}))}>
          <option value="">All Reps</option>{REPS.map(r=><option key={r}>{r}</option>)}
        </select>
        <select className="form-select" style={{width:130}} value={filters.status} onChange={e=>setFilters(f=>({...f,status:e.target.value}))}>
          <option value="">All Statuses</option>{STATUSES.map(s=><option key={s}>{s}</option>)}
        </select>
        <select className="form-select" style={{width:110}} value={filters.source} onChange={e=>setFilters(f=>({...f,source:e.target.value}))}>
          <option value="">All Sources</option>{SOURCE_TYPES.map(s=><option key={s}>{s}</option>)}
        </select>
        <select className="form-select" style={{width:160}} value={filters.campaign} onChange={e=>setFilters(f=>({...f,campaign:e.target.value}))}>
          <option value="">All Campaigns</option>{CAMPAIGNS.map(c=><option key={c}>{c}</option>)}
        </select>
        <button className="btn btn-ghost btn-sm" onClick={()=>{setFilters({rep:'',status:'',source:'',campaign:''});setPage(0);}}>Clear</button>
        <span style={{marginLeft:'auto',fontSize:12,color:'var(--cgm-neutral-dark)'}}>{filtered.length.toLocaleString()} leads</span>
        {selected.length > 0 && (
          <>
            <span style={{fontSize:12,fontWeight:600,color:'var(--cgm-secondary)'}}>{selected.length} selected</span>
            <select className="form-select" style={{width:130}} onChange={e=>e.target.value&&bulkUpdate('assignedRep',e.target.value)}>
              <option value="">Assign Rep…</option>{REPS.map(r=><option key={r}>{r}</option>)}
            </select>
            <select className="form-select" style={{width:130}} onChange={e=>e.target.value&&bulkUpdate('status',e.target.value)}>
              <option value="">Set Status…</option>{STATUSES.map(s=><option key={s}>{s}</option>)}
            </select>
          </>
        )}
      </div>

      <div className="card" style={{padding:0,overflow:'hidden'}}>
        <div className="table-wrap">
          <table className="data-table">
            <thead><tr>
              <th className="checkbox-col"><input type="checkbox" checked={selected.length===paginated.length&&paginated.length>0} onChange={toggleAll} /></th>
              <th>Business Name</th><th>Source</th><th>NPI / ID</th><th>Contact</th><th>Phone</th><th>City / State</th><th>Rep</th><th>Campaign</th><th>Status</th><th>Flag</th>
            </tr></thead>
            <tbody>{paginated.map(l => (
              <tr key={l.id}>
                <td><input type="checkbox" checked={selected.includes(l.id)} onChange={()=>toggleSelect(l.id)} /></td>
                <td><span style={{color:'var(--cgm-secondary)',fontWeight:600,cursor:'pointer'}} onClick={()=>setDrawerLead(l)}>{l.businessName}</span></td>
                <td><span className={`badge ${sourceBadgeClass(l.sourceType)}`}>{l.sourceType}</span></td>
                <td style={{fontFamily:'monospace',fontSize:12}}>{l.npi||l.providerNumber}</td>
                <td>{l.contactName}</td>
                <td style={{fontSize:12}}>{l.phone}</td>
                <td>{l.city}, {l.state}</td>
                <td><span style={{fontWeight:600,color:REP_COLORS[l.assignedRep]}}>{l.assignedRep}</span></td>
                <td style={{fontSize:11,maxWidth:120}}><span className="tag">{l.campaign||'—'}</span></td>
                <td><span className={`badge ${statusBadgeClass(l.status)}`}>{l.status}</span></td>
                <td>{l.flag}</td>
              </tr>
            ))}</tbody>
          </table>
        </div>
        <div style={{padding:'10px 16px',borderTop:'1px solid var(--cgm-neutral-bright)',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
          <span style={{fontSize:12,color:'var(--cgm-neutral-dark)'}}>Page {page+1} of {totalPages}</span>
          <div className="pagination">
            <button className="page-btn" onClick={()=>setPage(p=>Math.max(0,p-1))} disabled={page===0}>‹ Prev</button>
            {Array.from({length:Math.min(5,totalPages)},(_,i)=>i+Math.max(0,page-2)).filter(p=>p<totalPages).map(p=>(
              <button key={p} className={`page-btn ${p===page?'active':''}`} onClick={()=>setPage(p)}>{p+1}</button>
            ))}
            <button className="page-btn" onClick={()=>setPage(p=>Math.min(totalPages-1,p+1))} disabled={page===totalPages-1}>Next ›</button>
          </div>
        </div>
      </div>

      {drawerLead && (
        <>
          <div className="drawer-overlay" onClick={()=>setDrawerLead(null)} />
          <div className="drawer">
            <div className="drawer-header">
              <div className="drawer-title">{drawerLead.businessName}</div>
              <button className="close-btn" onClick={()=>setDrawerLead(null)}>✕</button>
            </div>
            <div style={{display:'flex',gap:8,marginBottom:14,flexWrap:'wrap'}}>
              <span className={`badge badge-${drawerLead.sourceType.toLowerCase()}`}>{drawerLead.sourceType}</span>
              <span className="badge badge-new">{drawerLead.specialty}</span>
            </div>
            <div className="form-group">
              <div className="form-label">Status</div>
              <select className="form-select" value={drawerLead.status} onChange={e=>updateLead(drawerLead.id,{status:e.target.value})}>
                {STATUSES.map(s=><option key={s}>{s}</option>)}
              </select>
            </div>
            <div className="form-group">
              <div className="form-label">Assigned Rep</div>
              <select className="form-select" value={drawerLead.assignedRep} onChange={e=>updateLead(drawerLead.id,{assignedRep:e.target.value})}>
                {REPS.map(r=><option key={r}>{r}</option>)}
              </select>
            </div>
            <div className="form-group">
              <div className="form-label">Campaign</div>
              <select className="form-select" value={drawerLead.campaign||''} onChange={e=>updateLead(drawerLead.id,{campaign:e.target.value})}>
                <option value="">—</option>{CAMPAIGNS.map(c=><option key={c}>{c}</option>)}
              </select>
            </div>
            <div style={{borderTop:'1px solid var(--cgm-neutral-bright)',paddingTop:14,marginTop:4}}>
              {[['NPI / ID', drawerLead.npi||drawerLead.providerNumber],['Contact', drawerLead.contactName],['Phone', drawerLead.phone],['City', `${drawerLead.city}, ${drawerLead.state} ${drawerLead.zip}`]].map(([k,v])=>(
                <div key={k} style={{display:'flex',justifyContent:'space-between',padding:'5px 0',borderBottom:'1px solid var(--cgm-ecru)',fontSize:13}}>
                  <span style={{color:'var(--cgm-neutral-dark)',fontWeight:500}}>{k}</span>

            </div>
            <button className="btn btn-primary full-width" onClick={()=>{addToast('Lead updated','success');setDrawerLead(null);}}>Save Changes</button>

        </>
      )}
    </div>
  );
}

// ─── ASSIGNMENT PAGE ──────────────────────────────────────────────────────────
function AssignmentPage({ leads, setLeads, addToast }) {
  const [mode, setMode] = useState('manual');
  const [selectedRep, setSelectedRep] = useState('');
  const [unassigned, setUnassigned] = useState([]);
  const [bulkCount, setBulkCount] = useState(10);

  useEffect(() => { setUnassigned(leads.filter(l=>l.status==='New')); }, [leads]);

  const repStats = REPS.map(r => ({
    name: r, count: leads.filter(l=>l.assignedRep===r).length,
    qualified: leads.filter(l=>l.assignedRep===r&&l.status==='Qualified').length,
    meetings: leads.filter(l=>l.assignedRep===r&&l.status==='Meeting Set').length,
    territory: REP_TERRITORIES[r], role: REP_ROLES[r]
  }));

  function doRoundRobin() {
    const newLeads = unassigned.slice(0,bulkCount);
    if (newLeads.length === 0) { addToast('No unassigned leads available','error'); return; }
    let idx = 0;
    const updates = {};
    newLeads.forEach(l => { updates[l.id] = REPS[idx % REPS.length]; idx++; });
    setLeads(prev => prev.map(l => updates[l.id] ? {...l, assignedRep: updates[l.id]} : l));
    addToast(`Distributed ${newLeads.length} leads across reps via round-robin`, 'success');
  }

  function assignToRep() {
    if (!selectedRep) return;
    const newLeads = unassigned.slice(0,bulkCount);
    setLeads(prev => prev.map(l => newLeads.find(nl=>nl.id===l.id) ? {...l, assignedRep: selectedRep} : l));
    addToast(`Assigned ${newLeads.length} leads to ${selectedRep}`, 'success');
  }

  return (
    <div className="page-content">
      <div className="grid-2" style={{marginBottom:16,alignItems:'start'}}>
        <div className="card">
          <div className="card-header"><div className="card-title">Assignment Mode</div></div>
          <div style={{display:'flex',gap:8,marginBottom:16}}>
            {['manual','round-robin'].map(m => (
              <button key={m} className={`btn ${mode===m?'btn-secondary':'btn-ghost'}`} onClick={()=>setMode(m)}>{m==='round-robin'?'🔄 Round-Robin':'✋ Manual'}</button>
            ))}
          </div>
          <div style={{background:'var(--cgm-ecru)',borderRadius:10,padding:14,marginBottom:14}}>
            <div style={{fontSize:12,color:'var(--cgm-neutral-dark)',marginBottom:4}}>Unassigned / New Leads</div>
            <div style={{fontSize:28,fontWeight:800,color:'var(--cgm-primary)'}}>{unassigned.length.toLocaleString()}</div>
          </div>
          <div className="form-group">
            <div className="form-label">Leads to Assign</div>
            <input type="number" className="form-input" value={bulkCount} min={1} max={unassigned.length} onChange={e=>setBulkCount(Number(e.target.value))} />
          </div>
          {mode === 'manual' && (
            <div className="form-group">
              <div className="form-label">Assign To Rep</div>
              <select className="form-select" value={selectedRep} onChange={e=>setSelectedRep(e.target.value)}>
                <option value="">Select rep…</option>{REPS.map(r=><option key={r}>{r}</option>)}
              </select>
            </div>
          )}
          <button className="btn btn-primary full-width" onClick={mode==='round-robin'?doRoundRobin:assignToRep}>
            {mode === 'round-robin' ? '🔄 Distribute via Round-Robin' : `✓ Assign ${bulkCount} to ${selectedRep||'Rep'}`}
          </button>
        </div>

        <div className="card">
          <div className="card-header"><div className="card-title">Queue Balance</div><div className="card-sub">Current load by rep</div></div>
          {repStats.sort((a,b)=>b.count-a.count).map(r => {
            const max = Math.max(...repStats.map(x=>x.count),1);
            return (
              <div key={r.name} style={{marginBottom:10}}>
                <div className="flex-between" style={{marginBottom:3}}>
                  <div className="flex-row gap-8">
                    <span style={{fontWeight:700,fontSize:13,color:REP_COLORS[r.name]}}>{r.name}</span>
                    <span style={{fontSize:10,background:'var(--cgm-ecru)',padding:'1px 6px',borderRadius:4,color:'var(--cgm-neutral-dark)'}}>{r.role}</span>
                    <span style={{fontSize:11,color:'var(--cgm-neutral-dark)'}}>{r.territory}</span>
                  </div>
                  <span style={{fontSize:13,fontWeight:700,color:'var(--cgm-primary)'}}>{r.count}</span>
                </div>
                <div className="progress-bar-bg">
                  <div className="progress-bar-fill" style={{width:`${(r.count/max)*100}%`,background:REP_COLORS[r.name]}}></div>
                </div>
              </div>
            );
          })}
        </div>
      </div>

      <div className="section-title">Rep Overview</div>
      <div className="rep-grid">
        {repStats.map(r => (
          <div key={r.name} className="rep-card">
            <div className="rep-avatar" style={{background:REP_COLORS[r.name]}}>{r.name[0]}</div>
            <div className="rep-name">{r.name}</div>
            <div className="rep-role">{r.role} · {r.territory}</div>
            <div className="rep-count">{r.count}</div>
            <div style={{fontSize:11,color:'var(--cgm-neutral-dark)'}}>
              <span style={{color:'#28a745',fontWeight:600}}>{r.qualified} QL</span> · <span style={{color:'var(--cgm-secondary)',fontWeight:600}}>{r.meetings} mtg</span>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

// ─── LEADERBOARD PAGE ─────────────────────────────────────────────────────────
function LeaderboardPage({ leads, activities }) {
  const [campaign, setCampaign] = useState('');
  const [metric, setMetric] = useState('qualified');

  const repStats = useMemo(() => REPS.map(r => {
    const myLeads = campaign ? leads.filter(l=>l.assignedRep===r&&l.campaign===campaign) : leads.filter(l=>l.assignedRep===r);
    const qualified = myLeads.filter(l=>l.status==='Qualified').length;
    const meetings = myLeads.filter(l=>l.status==='Meeting Set').length;
    const total = myLeads.length;
    const disq = myLeads.filter(l=>l.status==='Disqualified').length;
    const cvr = total > 0 ? ((qualified+meetings)/total*100).toFixed(1) : '0.0';
    const myActs = activities.filter(a=>a.rep===r);
    const dials = myActs.filter(a=>a.type==='Call').length;
    const emails = myActs.filter(a=>a.type==='Email').length;

    let flag = null;
    if (dials > 5 && qualified === 0) flag = { type: 'red', label: 'High dials, 0 conversions' };
    else if (meetings >= 2) flag = { type: 'green', label: 'Top performer' };
    else if (qualified === 0 && total > 5) flag = { type: 'yellow', label: 'Monitor — low QL rate' };

    return { name: r, total, qualified, meetings, disq, cvr, dials, emails, flag };
  }).sort((a,b) => {
    const m = {qualified:'qualified',meetings:'meetings',total:'total',cvr:'cvr',dials:'dials'};
    const key = m[metric] || 'qualified';
    return parseFloat(b[key]) - parseFloat(a[key]);
  }), [leads, activities, campaign, metric]);

  return (
    <div className="page-content">
      <div className="filter-bar" style={{marginBottom:16}}>
        <select className="form-select" style={{width:180}} value={campaign} onChange={e=>setCampaign(e.target.value)}>
          <option value="">All Campaigns</option>{CAMPAIGNS.map(c=><option key={c}>{c}</option>)}
        </select>
        <span style={{fontSize:12,fontWeight:600,color:'var(--cgm-neutral-dark)'}}>Rank by:</span>
        {['qualified','meetings','total','cvr','dials'].map(m=>(
          <button key={m} className={`btn btn-sm ${metric===m?'btn-secondary':'btn-ghost'}`} onClick={()=>setMetric(m)}>{m==='cvr'?'Conv%':m.charAt(0).toUpperCase()+m.slice(1)}</button>
        ))}
      </div>

      <div className="kpi-grid" style={{marginBottom:20}}>
        <div className="kpi-card accent"><div className="kpi-label">Total Qualified</div><div className="kpi-value">{leads.filter(l=>l.status==='Qualified').length}</div></div>
        <div className="kpi-card success"><div className="kpi-label">Meetings Set</div><div className="kpi-value">{leads.filter(l=>l.status==='Meeting Set').length}</div></div>
        <div className="kpi-card"><div className="kpi-label">Team Avg CVR</div><div className="kpi-value">{(repStats.reduce((a,r)=>a+parseFloat(r.cvr),0)/repStats.length).toFixed(1)}%</div></div>
        <div className="kpi-card warn"><div className="kpi-label">Coaching Flags</div><div className="kpi-value">{repStats.filter(r=>r.flag?.type==='red').length}</div></div>
      </div>

      <div className="card" style={{padding:0,overflow:'hidden'}}>
        <div className="table-wrap">
          <table className="data-table">
            <thead><tr>
              <th style={{width:40}}>Rank</th><th>Rep</th><th>Role</th><th>Territory</th>
              <th className="stat-cell">Assigned</th><th className="stat-cell">Qualified</th>
              <th className="stat-cell">Meetings</th><th className="stat-cell">CVR%</th>
              <th className="stat-cell">Dials</th><th className="stat-cell">Emails</th>
              <th>Coaching Flag</th>
            </tr></thead>
            <tbody>{repStats.map((r,i)=>(
              <tr key={r.name}>
                <td><div className={`lb-rank lb-rank-${i<3?i+1:'other'}`}>{i+1}</div></td>
                <td><span style={{fontWeight:700,color:REP_COLORS[r.name]}}>{r.name}</span></td>
                <td><span style={{fontSize:11,fontWeight:600}}>{REP_ROLES[r.name]}</span></td>
                <td style={{fontSize:12,color:'var(--cgm-neutral-dark)'}}>{REP_TERRITORIES[r.name]}</td>
                <td className="stat-cell">{r.total}</td>
                <td className="stat-cell" style={{fontWeight:700,color:'#28a745'}}>{r.qualified}</td>
                <td className="stat-cell" style={{fontWeight:700,color:'var(--cgm-secondary)'}}>{r.meetings}</td>
                <td className="stat-cell" style={{fontWeight:700}}>{r.cvr}%</td>
                <td className="stat-cell">{r.dials}</td>
                <td className="stat-cell">{r.emails}</td>
                <td>{r.flag ? <span className={`coach-flag ${r.flag.type}`}>{r.flag.label}</span> : <span style={{fontSize:12,color:'var(--cgm-neutral-dark)'}}>—</span>}</td>
              </tr>
            ))}</tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

// ─── EXPORTS PAGE ─────────────────────────────────────────────────────────────
function ExportsPage({ leads, addToast }) {
  const [history, setHistory] = useState([]);
  const [repFilter, setRepFilter] = useState('');
  const [statusFilter, setStatusFilter] = useState('');

  function doExport(label, filterFn) {
    const rows = leads.filter(filterFn || (()=>true));
    const ws = XLSX.utils.json_to_sheet(rows.map(l=>({
      'ID': l.id, 'Business Name': l.businessName, 'Source': l.sourceType,
      'NPI / Provider #': l.npi||l.providerNumber, 'Contact': l.contactName,
      'Phone': l.phone, 'City': l.city, 'State': l.state, 'Zip': l.zip,
      'Specialty': l.specialty, 'Status': l.status, 'Assigned Rep': l.assignedRep,
      'Campaign': l.campaign, 'Notes': l.notes, 'Imported': l.importedAt
    })));
    ws['!cols'] = [{wch:10},{wch:30},{wch:8},{wch:14},{wch:20},{wch:14},{wch:14},{wch:6},{wch:8},{wch:18},{wch:14},{wch:10},{wch:20},{wch:30},{wch:22}];
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, 'Leads');
    const fname = `CGM_${label.replace(/\s+/g,'_')}_${new Date().toISOString().slice(0,10)}.xlsx`;
    XLSX.writeFile(wb, fname);
    setHistory(h=>[{id:Date.now(),label,fname,rows:rows.length,ts:new Date().toLocaleString()},...h]);
    addToast(`Exported ${rows.length} leads → ${fname}`, 'success');
  }

  const exportOptions = [
    { icon:'📦', label:'Full Master Export', sub:'All leads, all reps, all statuses', fn:()=>doExport('Master_Export') },
    { icon:'👤', label:'Rep Export', sub:'Filter by rep before exporting', action:'rep' },
    { icon:'🔍', label:'Filtered Export', sub:'Filter by status before exporting', action:'status' },
    { icon:'⭐', label:'Qualified Leads Only', sub:'SQLs ready for RSE / FSE handoff', fn:()=>doExport('Qualified_Leads',l=>l.status==='Qualified') },
    { icon:'📅', label:'Meeting Set Export', sub:'Booked meetings for field team', fn:()=>doExport('Meetings_Set',l=>l.status==='Meeting Set') },
    { icon:'🆕', label:'New Leads Export', sub:'Unworked leads for outreach', fn:()=>doExport('New_Leads',l=>l.status==='New') },
  ];

  return (
    <div className="page-content">
      <div className="grid-3" style={{marginBottom:20}}>
        {exportOptions.map(opt=>(
          <div key={opt.label} className="export-option" onClick={opt.fn||(()=>{})}>
            <div style={{fontSize:28,marginBottom:8}}>{opt.icon}</div>
            <div style={{fontWeight:700,fontSize:14,color:'var(--cgm-primary)',marginBottom:4}}>{opt.label}</div>
            <div style={{fontSize:12,color:'var(--cgm-neutral-dark)',marginBottom:12}}>{opt.sub}</div>
            {opt.action === 'rep' && (
              <div onClick={e=>e.stopPropagation()}>
                <select className="form-select" style={{marginBottom:8}} value={repFilter} onChange={e=>setRepFilter(e.target.value)}>
                  <option value="">All Reps</option>{REPS.map(r=><option key={r}>{r}</option>)}
                </select>
                <button className="btn btn-secondary btn-sm full-width" onClick={()=>doExport(`Rep_${repFilter||'All'}`,l=>!repFilter||l.assignedRep===repFilter)}>Export</button>
              </div>
            )}
            {opt.action === 'status' && (
              <div onClick={e=>e.stopPropagation()}>
                <select className="form-select" style={{marginBottom:8}} value={statusFilter} onChange={e=>setStatusFilter(e.target.value)}>
                  <option value="">All Statuses</option>{STATUSES.map(s=><option key={s}>{s}</option>)}
                </select>
                <button className="btn btn-secondary btn-sm full-width" onClick={()=>doExport(`Status_${statusFilter||'All'}`,l=>!statusFilter||l.status===statusFilter)}>Export</button>
              </div>
            )}
            {opt.fn && <button className="btn btn-secondary btn-sm">Download ↓</button>}
          </div>
        ))}
      </div>

      <div className="section-title">Export History</div>
      {history.length === 0 ? (
        <div className="empty-state"><div className="empty-state-icon">📭</div><div className="empty-state-title">No exports yet</div><div className="empty-state-sub">Run an export above to see it here</div></div>
      ) : (
        <div className="card" style={{padding:0}}>
          <table className="data-table">
            <thead><tr><th>File Name</th><th>Export Type</th><th>Rows</th><th>Timestamp</th></tr></thead>
            <tbody>{history.map(h=>(
              <tr key={h.id}><td style={{fontFamily:'monospace',fontSize:12}}>{h.fname}</td><td>{h.label}</td><td style={{fontWeight:700,color:'var(--cgm-secondary)'}}>{h.rows.toLocaleString()}</td><td style={{fontSize:12,color:'var(--cgm-neutral-dark)'}}>{h.ts}</td></tr>
            ))}</tbody>
          </table>
        </div>
      )}
    </div>
  );
}

  const [customCampaigns, setCustomCampaigns] = useState([...CAMPAIGNS]);
  const [newStatus, setNewStatus] = useState('');
  const [newCampaign, setNewCampaign] = useState('');
  const [users, setUsers] = useState(REPS.map(r=>({name:r,role:REP_ROLES[r],territory:REP_TERRITORIES[r],active:true,target:40})));
  const [editUser, setEditUser] = useState(null);

  const tabs = [
    {id:'statuses',label:'Lead Statuses'},
    {id:'campaigns',label:'Campaigns'},
    {id:'users',label:'Users & Reps'},
    {id:'dedupe',label:'Deduplication'},
    {id:'rules',label:'Assignment Rules'},
  ];

  function dedupe() {
    const seen = new Set();
    const deduped = leads.filter(l => {
      const key = `${l.npi||l.providerNumber}|${l.businessName.toLowerCase()}`;
      if (seen.has(key)) return false;
      seen.add(key); return true;
    });
    const removed = leads.length - deduped.length;
    setLeads(deduped);
    addToast(`Removed ${removed} duplicate leads`, 'success');
  }

  return (
    <div className="page-content">
      <div className="tab-bar">
        {tabs.map(t=><button key={t.id} className={`tab-btn ${activeTab===t.id?'active':''}`} onClick={()=>setActiveTab(t.id)}>{t.label}</button>)}

        <div className="card" style={{maxWidth:520}}>

      {activeTab === 'campaigns' && (

            ['CLIA Records', 'Assign to BDRs (Hanna, Maia)'],
            ['LAB Records', 'Assign to LGS (Brenda, Misty)'],
            ['Qualified Leads', 'Notify Lisa for RSE/FSE handoff'],
            ['Meeting Set', 'Flag for field sales confirmation'],
          ].map(([rule, val]) => (
            <div key={rule} style={{padding:'10px 0',borderBottom:'1px solid var(--cgm-neutral-bright)',display:'flex',justifyContent:'space-between',alignItems:'center',fontSize:13}}>
              <span style={{fontWeight:600,color:'var(--cgm-primary)'}}>{rule}</span>
              <span style={{color:'var(--cgm-neutral-dark)',maxWidth:260,textAlign:'right'}}>{val}</span>
            </div>
          ))}
          <div style={{marginTop:12,padding:12,background:'var(--cgm-tertiary)',borderRadius:8,fontSize:12,color:'var(--cgm-secondary)',fontWeight:600}}>
            ℹ️ Assignment rules are applied automatically on import. Edit above to override.
          </div>
        </div>
      )}
    </div>
  );
}

// ─── APP ROOT ─────────────────────────────────────────────────────────────────
function App() {
  const [page, setPage] = useState('home');
  const [leads, setLeads] = useState(genSampleLeads(120));
  const [activities] = useState(() => genActivities(genSampleLeads(120)));
  const [toasts, setToasts] = useState([]);
  const [search, setSearch] = useState('');

  function addToast(msg, type='') {
    const id = Date.now();
    setToasts(t => [...t, {id, msg, type}]);
    setTimeout(() => setToasts(t => t.filter(x=>x.id!==id)), 3200);
  }

  function handleImport(newLeads) { setLeads(prev => [...newLeads, ...prev]); }

  const PAGE_TITLES = { home:'Today / Home', import:'Import Leads', queue:'Lead Queue', assignment:'Rep Assignment', leaderboard:'Leaderboard', exports:'Exports', admin:'Admin Settings' };
  const PAGE_SUBS = { home:'Activity summary & pipeline snapshot', import:'Upload NPI, CLIA, and Lab files', queue:`${leads.length.toLocaleString()} leads`, assignment:'Manage rep workloads', leaderboard:'Rep rankings & coaching flags', exports:'Download lead lists', admin:'Configure rules & users' };

  const primaryActions = {
    import: { label:'+ Import File', fn:()=>setPage('import') },
    queue: { label:'+ Add Lead', fn:()=>addToast('Manual lead entry coming soon') },
    exports: { label:'📦 Full Export', fn:()=>{} }
  };

  return (
    <div className="app-shell">
      <Sidebar active={page} onNav={setPage} />
      <div className="main-area">
        <TopBar
          title={PAGE_TITLES[page]}
          subtitle={PAGE_SUBS[page]}
          syncStatus="Live"
          onSearch={setSearch}
          searchVal={search}
          primaryAction={primaryActions[page]}
        />
        {page === 'home' && <DashboardPage leads={leads} activities={activities} addToast={addToast} />}
        {page === 'import' && <ImportPage onImport={handleImport} addToast={addToast} />}
        {page === 'queue' && <QueuePage leads={leads} setLeads={setLeads} addToast={addToast} globalSearch={search} />}
        {page === 'assignment' && <AssignmentPage leads={leads} setLeads={setLeads} addToast={addToast} />}

        {page === 'exports' && <ExportsPage leads={leads} addToast={addToast} />}
        {page === 'admin' && <AdminPage leads={leads} setLeads={setLeads} addToast={addToast} />}
      </div>
      <Toast toasts={toasts} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
<div id="root"></div>
</body>
</html>
